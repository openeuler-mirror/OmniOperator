syntax = "proto3";

package nova.hetu.omniruntime.vector.serialize;

message VecBatch {
    int32 rowCount = 1;
    int32 vecCount = 2;
    repeated Vec vectors = 3;
}

message Vec {
    VecTypeExt typeExt = 1;
    int32 size = 2;
    int32 offset = 3;
    bytes values = 4;
    bytes nulls = 5;
    bytes offsets = 6;
    repeated Vec subVectors = 7;
}

message VecTypeExt {
    enum VecTypeId {
        OMNI_VEC_TYPE_NONE = 0;
        OMNI_VEC_TYPE_INT = 1;
        OMNI_VEC_TYPE_LONG = 2;
        OMNI_VEC_TYPE_DOUBLE = 3;
        OMNI_VEC_TYPE_BOOLEAN = 4;
        OMNI_VEC_TYPE_SHORT = 5;
        OMNI_VEC_TYPE_DECIMAL64 = 6;
        OMNI_VEC_TYPE_DECIMAL128 = 7;
        OMNI_VEC_TYPE_DATE32 = 8;
        OMNI_VEC_TYPE_DATE64 = 9;
        OMNI_VEC_TYPE_TIME32 = 10;
        OMNI_VEC_TYPE_TIME64 = 11;
        OMNI_VEC_TYPE_TIMESTAMP = 12;
        OMNI_VEC_TYPE_INTERVAL_MONTHS = 13;
        OMNI_VEC_TYPE_INTERVAL_DAY_TIME = 14;
        OMNI_VEC_TYPE_VARCHAR = 15;
        OMNI_VEC_TYPE_CHAR = 16;
        OMNI_VEC_TYPE_DICTIONARY = 17;
        OMNI_VEC_TYPE_CONTAINER = 18;
        OMNI_VEC_TYPE_INVALID = 19;
    }
    VecTypeId id = 1;
    int32 width = 2;
    int32 precision = 3;
    int32 scale = 4;
    enum DateUnit {
        DAY = 0;
        MILLI = 1;
    }
    DateUnit dateUnit = 5;
    enum TimeUnit {
        SEC = 0;
        MILLISEC = 1;
        MICROSEC = 2;
        NANOSEC = 3;
    }
    TimeUnit timeUnit = 6;
}